services:
  db_postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - postgres-data:/var/lib/postgresql/data

  db_mysql:
    image: mysql:5.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: moodle
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodle
    volumes:
      - mysql-data:/var/lib/mysql

  odoo:
    image: ameliasoh/is214:v1
    restart: unless-stopped
    depends_on:
      - db_postgres
    ports:
      - "8069:8069"
    environment:
      - HOST=db_postgres
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - ./addons:/mnt/extra-addons
      - ./filestore:/var/lib/odoo/filestore
      - odoo-data:/var/lib/odoo
    command: >
      --db_host=db_postgres
      --db_port=5432
      --db_user=odoo
      --db_password=odoo
      --db_maxconn=10

  moodle:
    image: ellakcy/moodle:mysql_maria_apache
    restart: unless-stopped
    depends_on:
      - db_mysql
    ports:
      - "8080:80"
    environment:
      MOODLE_DB_HOST: db_mysql
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASSWORD: moodle
      MOODLE_DB_NAME: moodle
      MOODLE_URL: http://52.184.80.14:8080
    volumes:
      - moodle-data:/var/moodledata

volumes:
  postgres-data:
  mysql-data:
  odoo-data:
  moodle-data:
  moodle-data-persistence: