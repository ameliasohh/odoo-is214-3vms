services:
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    image: jinhongoih2024/is214:v1
    container_name: odoo
    restart: unless-stopped
    ports:
      - "8069:8069"
    environment:
      HOST: ${ODOO_DB_HOST}
      USER: ${ODOO_DB_USER}
      PASSWORD: ${ODOO_DB_PASSWORD}
    command: >
      odoo --db_host=${ODOO_DB_HOST}
      --db_port=${ODOO_DB_PORT:-5432}
      --db_user=${ODOO_DB_USER}
      --db_password=${ODOO_DB_PASSWORD}
    volumes:
      - ./addons:/mnt/extra-addons
      - ./filestore:/var/lib/odoo/filestore
    networks:
      - app

  moodle:
    image: moodlehq/moodle-php-apache:8.2
    container_name: moodle
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      MOODLE_DBTYPE: ${MOODLE_DB_TYPE:-mysqli}
      MOODLE_DBHOST: ${MOODLE_DB_HOST}
      MOODLE_DBPORT: ${MOODLE_DB_PORT:-3306}
      MOODLE_DBNAME: ${MOODLE_DB_NAME}
      MOODLE_DBUSER: ${MOODLE_DB_USER}
      MOODLE_DBPASS: ${MOODLE_DB_PASSWORD}
      MOODLE_WWWROOT: ${MOODLE_WWWROOT:-http://localhost:8080}
    volumes:
      - moodledata:/var/moodledata
    networks:
      - app

volumes:
  moodledata: {}

networks:
  app:
    driver: bridge