# docker-compose.yml — VM1 & VM2 (local DB version)
services:
  db_postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - postgres-data:/var/lib/postgresql/data

  db_mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: moodle
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodle
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  odoo:
    image: ameliasoh/is214:v1
    restart: unless-stopped
    depends_on: [db_postgres]
    ports:
      - "8069:8069"
    environment:
      - HOST=db_postgres
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - ./addons:/mnt/extra-addons
      - ./filestore:/var/lib/odoo/filestore
      - odoo-data:/var/lib/odoo
    command: >
      --db_host=db_postgres
      --db_port=5432
      --db_user=odoo
      --db_password=odoo
      --db_maxconn=10

  moodle:
    image: bitnamilegacy/moodle:latest
    restart: unless-stopped
    depends_on: [db_mysql]
    ports:
      - "8080:80"
    environment:
      - MOODLE_DATABASE_TYPE=mysqli
      - MOODLE_DATABASE_HOST=db_mysql
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_USER=moodle
      - MOODLE_DATABASE_PASSWORD=moodle
      - MOODLE_DATABASE_NAME=moodle
      - MOODLE_USERNAME=admin
      - MOODLE_PASSWORD=Moodle@2024
      - MOODLE_EMAIL=admin@staging.local
      - MOODLE_SITE_NAME=IS214 Staging Moodle
    volumes:
      - moodle-data:/bitnami/moodle
      - moodle-data-persistence:/bitnami/moodledata

volumes:
  postgres-data: {}
  mysql-data: {}
  odoo-data: {}
  moodle-data: {}
  moodle-data-persistence: {}