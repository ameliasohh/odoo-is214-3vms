global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: traefik
    metrics_path: /metrics
    static_configs:
      - targets: ["traefik:8080"]

  - job_name: vm-node-exporter
    static_configs:
      - targets:
          - "10.0.1.4:9100"
          - "10.0.1.5:9100"
          - "10.0.2.4:9100"