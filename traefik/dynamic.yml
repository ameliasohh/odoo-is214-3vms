http:
  routers:
    odoo-router:
      rule: "Host(`odoo.example.com`)"
      service: odoo-service
      entryPoints:
        - websecure
      middlewares:
        - vpn-whitelist
      tls:
        certResolver: letsencrypt

    moodle-router:
      rule: "Host(`moodle.example.com`)"
      service: moodle-service
      entryPoints:
        - websecure
      middlewares:
        - vpn-whitelist
      tls:
        certResolver: letsencrypt

  services:
    odoo-service:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.0.1.4:8069"
          - url: "http://10.0.1.5:8069"

    moodle-service:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.0.1.4:8080"
          - url: "http://10.0.1.5:8080"

  middlewares:
    vpn-whitelist:
      ipWhiteList:
        sourceRange:
          - "10.100.0.0/24"